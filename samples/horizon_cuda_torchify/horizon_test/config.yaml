model_parameters:
  onnx_model: ../export/model_torch.onnx
  march: bernoulli2
  working_dir: ./hb_workspace
  output_model_file_prefix: sample_add

input_parameters:
  input_name: x;y
  input_shape: 1x3x8x8;1x3x8x8
  input_type_train: featuremap;featuremap
  input_type_rt: featuremap;featuremap
  norm_type: no_preprocess;no_preprocess

calibration_parameters:
  cal_data_dir: ../data
  calibration_type: default
